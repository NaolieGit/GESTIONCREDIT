<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestion Crédit — Gestionnaire de Dossiers</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #0D2340;
    --paper: #F0F6FF;
    --cream: #E3EFFF;
    --gold: #2D8FD4;
    --gold-light: #BDE0F8;
    --rust: #1A6BAF;
    --forest: #1557A0;
    --forest-light: #2D8FD4;
    --mist: #6B87A8;
    --border: #C2D9F0;
    --white: #FFFFFF;
    --danger: #C0392B;
    --sky: #87CEEB;
    --sky-dark: #1A78C2;
    --shadow: 0 2px 12px rgba(13,35,64,0.08);
    --shadow-lg: 0 8px 32px rgba(13,35,64,0.14);
  }
  html { font-size: 15px; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
  }
  h1,h2,h3,h4 { font-family: 'Syne', sans-serif; }

  
  .app-shell { display: flex; min-height: 1cqb; }
  .sidebar {
    width: 260px; min-height: 100vh; background: #0D2340;
    padding: 0; display: flex; flex-direction: column;
    position: fixed; left: 0; top: 0; bottom: 0; z-index: 100;
  }
  .sidebar-logo {
    padding: 28px 24px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .logo-badge {
    display: inline-flex; align-items: center; gap: 10px;
    background: #2D8FD4; color: white;
    padding: 6px 12px 6px 8px; border-radius: 6px;
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem;
  }
  .logo-dot { width: 8px; height: 8px; background: white; border-radius: 50%; }
  .sidebar-subtitle { color: rgba(255,255,255,0.4); font-size: 0.7rem; margin-top: 8px; letter-spacing: 0.1em; text-transform: uppercase; }
  .sidebar-nav { padding: 20px 12px; flex: 1; }
  .nav-section-label { color: rgba(255,255,255,0.3); font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; padding: 0 12px; margin-bottom: 8px; margin-top: 16px; }
  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; border-radius: 8px; cursor: pointer;
    color: rgba(255,255,255,0.6); font-size: 0.88rem; font-weight: 500;
    transition: all 0.15s; margin-bottom: 2px;
  }
  .nav-item:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.9); }
  .nav-item.active { background: var(--gold); color: var(--ink); }
  .nav-item .nav-icon { font-size: 1rem; width: 20px; text-align: center; }
  .nav-badge { margin-left: auto; background: #C0392B; color: white; font-size: 0.65rem; font-weight: 700; padding: 2px 7px; border-radius: 20px; }
  .nav-badge.green { background: #2D8FD4; }
  .sidebar-footer { padding: 16px 24px; border-top: 1px solid rgba(255,255,255,0.08); color: rgba(255,255,255,0.3); font-size: 0.72rem; }

  .main-content { margin-left: 260px; flex: 1; padding: 0; }
  .topbar {
    background: var(--white); border-bottom: 1px solid var(--border);
    padding: 16px 32px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 50;
  }
  .topbar-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.15rem; }
  .topbar-actions { display: flex; gap: 10px; align-items: center; }
  .page-body { padding: 28px 32px; }

  /* BUTTONS */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 9px 18px; border-radius: 8px; border: none;
    font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 500;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .btn-primary { background: #1A78C2; color: white; }
  .btn-primary:hover { background: #1565A8; }
  .btn-gold { background: #2D8FD4; color: white; }
  .btn-gold:hover { background: #1A78C2; }
  .btn-outline { background: transparent; color: var(--ink); border: 1.5px solid var(--border); }
  .btn-outline:hover { background: var(--cream); }
  .btn-danger { background: var(--danger); color: white; }
  .btn-sm { padding: 6px 12px; font-size: 0.8rem; }
  .btn-lg { padding: 12px 24px; font-size: 0.95rem; }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }

  /* CARDS */
  .card { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 24px; box-shadow: var(--shadow); }
  .card-sm { padding: 16px; }

  /* STATS ROW */
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
  .stat-card { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .stat-label { font-size: 0.72rem; color: var(--mist); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
  .stat-value { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; line-height: 1; }
  .stat-sub { font-size: 0.75rem; color: var(--mist); margin-top: 4px; }
  .stat-card.gold { border-left: 3px solid #2D8FD4; }
  .stat-card.green { border-left: 3px solid #87CEEB; }
  .stat-card.rust { border-left: 3px solid #1A78C2; }
  .stat-card.mist { border-left: 3px solid #6B87A8; }

  /* DOSSIER LIST */
  .dossier-list { display: flex; flex-direction: column; gap: 10px; }
  .dossier-row {
    background: white; border: 1px solid var(--border); border-radius: 12px;
    padding: 16px 20px; display: flex; align-items: center; gap: 16px;
    cursor: pointer; transition: all 0.15s;
  }
  .dossier-row:hover { border-color: #2D8FD4; box-shadow: var(--shadow); transform: translateY(-1px); }
  .dossier-avatar {
    width: 42px; height: 42px; border-radius: 10px;
    background: var(--cream); display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 0.95rem; color: var(--ink);
    flex-shrink: 0;
  }
  .dossier-info { flex: 1; min-width: 0; }
  .dossier-name { font-weight: 600; font-size: 0.93rem; }
  .dossier-meta { font-size: 0.77rem; color: var(--mist); margin-top: 2px; }
  .dossier-amount { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.95rem; white-space: nowrap; }
  .dossier-progress-wrap { width: 80px; }
  .progress-bar { height: 5px; background: var(--cream); border-radius: 10px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 10px; background: #2D8FD4; transition: width 0.3s; }
  .progress-fill.warn { background: #87CEEB; }
  .progress-fill.danger { background: #1A78C2; }
  .progress-label { font-size: 0.68rem; color: var(--mist); margin-top: 3px; text-align: right; }

  /* STATUS BADGE */
  .badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 600; }
  .badge-complete { background: #D6ECFA; color: #1557A0; }
  .badge-partial { background: #E3EFFF; color: #1A78C2; }
  .badge-new { background: #E3F2FD; color: #1565C0; }
  .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  /* FORM */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-label { font-size: 0.8rem; font-weight: 600; color: var(--ink); }
  .form-label span { color: var(--rust); margin-left: 2px; }
  .form-input, .form-select, .form-textarea {
    padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px;
    font-family: 'DM Sans', sans-serif; font-size: 0.88rem; color: var(--ink);
    background: white; transition: border-color 0.15s; outline: none;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: #2D8FD4; }
  .form-textarea { min-height: 80px; resize: vertical; }
  .form-hint { font-size: 0.72rem; color: var(--mist); }

  /* SOUS-DOSSIERS */
  .sous-dossier-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .tab-btn {
    padding: 8px 18px; border-radius: 8px; border: 1.5px solid var(--border);
    background: white; font-family: 'Syne', sans-serif; font-weight: 600;
    font-size: 0.83rem; cursor: pointer; transition: all 0.15s; color: var(--mist);
    display: flex; align-items: center; gap: 6px;
  }
  .tab-btn.active { background: #1A78C2; color: white; border-color: #1A78C2; }
  .tab-btn.validated { background: #E3EFFF; color: #1557A0; border-color: #87CEEB; }
  .tab-btn.validated.active { background: #1557A0; color: white; border-color: #1557A0; }
  .tab-btn.locked { background: var(--paper); color: var(--border); border-color: var(--border); cursor: not-allowed; opacity: 0.6; }
  .tab-btn .tab-count { font-size: 0.7rem; opacity: 0.7; }
  .tab-btn .tab-icon { font-size: 0.8rem; }

  /* VALIDATION BANNER */
  .validation-banner {
    border-radius: 12px; padding: 18px 20px;
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    margin-top: 20px; border: 1.5px solid;
  }
  .validation-banner.ready { background: #E3EFFF; border-color: #87CEEB; }
  .validation-banner.incomplete { background: #EDF4FF; border-color: #BDE0F8; }
  .validation-banner.done { background: #D6ECFA; border-color: #2D8FD4; }
  .validation-banner-left { display: flex; align-items: center; gap: 12px; }
  .validation-banner-icon { font-size: 1.5rem; flex-shrink: 0; }
  .validation-banner-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.92rem; }
  .validation-banner-sub { font-size: 0.78rem; color: var(--mist); margin-top: 2px; }
  .btn-validate { background: #1A78C2; color: white; border: none; padding: 10px 22px; border-radius: 8px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.88rem; cursor: pointer; transition: all 0.15s; white-space: nowrap; display: flex; align-items: center; gap: 8px; }
  .btn-validate:hover { background: #1557A0; transform: translateY(-1px); }
  .btn-validate:disabled { background: var(--border); color: var(--mist); cursor: not-allowed; transform: none; }
  .btn-unvalidate { background: transparent; color: var(--mist); border: 1.5px solid var(--border); padding: 8px 16px; border-radius: 8px; font-size: 0.8rem; cursor: pointer; transition: all 0.15s; }
  .btn-unvalidate:hover { border-color: var(--rust); color: var(--rust); }

  /* UPLOAD ZONE */
  .upload-zone {
    border: 2px dashed var(--border); border-radius: 12px; padding: 32px;
    text-align: center; cursor: pointer; transition: all 0.2s;
    background: var(--paper);
  }
  .upload-zone:hover, .upload-zone.drag-over { border-color: #2D8FD4; background: #BDE0F8; }
  .upload-icon { font-size: 2rem; margin-bottom: 10px; }
  .upload-title { font-family: 'Syne', sans-serif; font-weight: 700; margin-bottom: 6px; }
  .upload-sub { font-size: 0.8rem; color: var(--mist); }

  /* DOC CHECKLIST */
  .doc-checklist { display: flex; flex-direction: column; gap: 8px; }
  .doc-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; border-radius: 8px; border: 1px solid var(--border);
    background: white; transition: all 0.15s;
  }
  .doc-item.uploaded { border-color: #87CEEB; background: #E3EFFF; }
  .doc-item.missing { border-color: #FFCDD2; background: #FFF5F5; }
  .doc-check { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; flex-shrink: 0; }
  .doc-check.ok { background: #2D8FD4; color: white; }
  .doc-check.no { background: var(--border); color: var(--mist); }
  .doc-check.req { background: #C0392B; color: white; }
  .doc-name { flex: 1; font-size: 0.85rem; font-weight: 500; }
  .doc-file-name { font-size: 0.72rem; color: var(--mist); }
  .doc-actions { display: flex; gap: 6px; }

  /* FILE PILL */
  .file-pill {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--cream); border: 1px solid var(--border);
    padding: 4px 10px; border-radius: 20px; font-size: 0.75rem;
  }
  .file-pill-remove { background: none; border: none; cursor: pointer; color: var(--mist); font-size: 0.9rem; line-height: 1; padding: 0 2px; }
  .file-pill-remove:hover { color: var(--danger); }

  /* UPLOADED FILES GRID */
  .files-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }

  /* TIMELINE */
  .timeline { display: flex; flex-direction: column; gap: 0; }
  .timeline-item { display: flex; gap: 14px; padding-bottom: 20px; position: relative; }
  .timeline-item:not(:last-child)::before { content: ''; position: absolute; left: 13px; top: 28px; bottom: 0; width: 1px; background: var(--border); }
  .timeline-dot { width: 28px; height: 28px; border-radius: 50%; background: var(--cream); border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 0.8rem; flex-shrink: 0; z-index: 1; }
  .timeline-dot.gold { background: #2D8FD4; border-color: #2D8FD4; color: white; }
  .timeline-dot.green { background: #87CEEB; border-color: #87CEEB; color: white; }
  .timeline-content { flex: 1; }
  .timeline-action { font-weight: 600; font-size: 0.85rem; }
  .timeline-time { font-size: 0.72rem; color: var(--mist); margin-top: 2px; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(13,17,23,0.55);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; padding: 20px; animation: fadeIn 0.15s;
  }
  .modal {
    background: white; border-radius: 16px; width: 100%; max-width: 760px;
    max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lg);
    animation: slideUp 0.2s;
  }
  .modal-header { padding: 24px 28px 0; display: flex; align-items: center; justify-content: space-between; }
  .modal-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem; }
  .modal-close { background: var(--cream); border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 1.1rem; }
  .modal-body { padding: 24px 28px; }
  .modal-footer { padding: 16px 28px 24px; display: flex; justify-content: flex-end; gap: 10px; border-top: 1px solid var(--border); }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  /* SECTION HEADER */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .section-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1rem; }
  .section-line { height: 3px; width: 32px; background: #2D8FD4; border-radius: 2px; margin-top: 4px; }

  /* DIVIDER */
  .divider { height: 1px; background: var(--border); margin: 20px 0; }

  /* EMPTY STATE */
  .empty-state { text-align: center; padding: 60px 20px; }
  .empty-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.4; }
  .empty-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.1rem; color: var(--mist); }
  .empty-sub { font-size: 0.83rem; color: var(--mist); margin-top: 6px; }

  /* DETAIL VIEW */
  .detail-header { display: flex; gap: 20px; align-items: flex-start; margin-bottom: 28px; }
  .detail-avatar { width: 56px; height: 56px; border-radius: 14px; background: #1A78C2; color: white; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.3rem; }
  .detail-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; }
  .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--cream); font-size: 0.85rem; }
  .info-key { color: var(--mist); }
  .info-val { font-weight: 600; }

  /* COMPLETION RING */
  .completion-ring { position: relative; display: inline-flex; align-items: center; justify-content: center; }
  .ring-label { position: absolute; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 0.9rem; }

  /* TAG */
  .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 600; background: var(--cream); color: var(--mist); }

  /* SEARCH */
  .search-bar { display: flex; align-items: center; gap: 10px; background: white; border: 1.5px solid var(--border); border-radius: 8px; padding: 9px 14px; }
  .search-bar input { border: none; outline: none; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; flex: 1; }
  .search-icon { color: var(--mist); }

  /* ALERT */
  .alert { padding: 12px 16px; border-radius: 8px; font-size: 0.83rem; margin-bottom: 16px; display: flex; gap: 10px; align-items: flex-start; }
  .alert-warning { background: #E3EFFF; border: 1px solid #BDE0F8; color: #1557A0; }
  .alert-success { background: #E3EFFF; border: 1px solid #87CEEB; color: #1557A0; }
  .alert-info { background: #E3F2FD; border: 1px solid #90CAF9; color: #1565C0; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

  /* LOGIN SCREEN */
  .login-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: #0D2340; position: relative; overflow: hidden;
  }
  .login-bg-pattern {
    position: absolute; inset: 0; opacity: 0.06;
    background-image: repeating-linear-gradient(45deg, #2D8FD4 0, #2D8FD4 1px, transparent 0, transparent 50%);
    background-size: 30px 30px;
  }
  .login-card {
    background: var(--paper); border-radius: 20px; padding: 48px 44px;
    width: 100%; max-width: 420px; box-shadow: 0 24px 64px rgba(0,0,0,0.4);
    position: relative; z-index: 1;
  }
  .login-logo {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 32px;
  }
  .login-logo-badge {
    display: inline-flex; align-items: center; gap: 10px;
    background: #2D8FD4; color: white;
    padding: 8px 14px 8px 10px; border-radius: 8px;
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.15rem;
  }
  .login-title {
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.5rem;
    margin-bottom: 6px; color: var(--ink);
  }
  .login-subtitle { font-size: 0.85rem; color: var(--mist); margin-bottom: 32px; }
  .login-input-wrap { position: relative; margin-bottom: 20px; }
  .login-input-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    font-size: 1.1rem; pointer-events: none;
  }
  .login-input {
    width: 100%; padding: 13px 44px 13px 42px;
    border: 1.5px solid var(--border); border-radius: 10px;
    font-family: 'DM Sans', sans-serif; font-size: 0.95rem; color: var(--ink);
    background: white; outline: none; transition: border-color 0.15s;
  }
  .login-input:focus { border-color: #2D8FD4; }
  .login-input.error { border-color: var(--danger); }
  .login-eye {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; font-size: 1.1rem;
    color: var(--mist); padding: 0;
  }
  .login-error {
    background: #FFF0EE; border: 1px solid #FFCDD2; color: var(--danger);
    padding: 10px 14px; border-radius: 8px; font-size: 0.83rem;
    margin-bottom: 18px; display: flex; align-items: center; gap: 8px;
    animation: shake 0.3s ease;
  }
  .login-btn {
    width: 100%; padding: 14px; border-radius: 10px; border: none;
    background: #1A78C2; color: white; font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: 1rem; cursor: pointer; transition: all 0.15s;
    margin-top: 4px;
  }
  .login-btn:hover { background: #1557A0; transform: translateY(-1px); }
  .login-btn:active { transform: translateY(0); }
  .login-footer { margin-top: 28px; text-align: center; font-size: 0.75rem; color: var(--mist); }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  /* ── RESPONSIVE TABLET (≤ 900px) ── */
  @media (max-width: 900px) {
    .stats-row { grid-template-columns: 1fr 1fr; }
    .detail-grid { grid-template-columns: 1fr; }
    .form-grid { grid-template-columns: 1fr; }
    .form-group.full { grid-column: 1; }
  }

  /* ── RESPONSIVE MOBILE (≤ 640px) ── */
  @media (max-width: 640px) {

    /* Masquer la sidebar latérale */
    .sidebar { display: none; }

    /* Le main prend toute la largeur */
    .main-content { margin-left: 0; padding-bottom: 70px; }

    /* Topbar compacte */
    .topbar { padding: 12px 16px; flex-wrap: wrap; gap: 10px; }
    .topbar-title { font-size: 1rem; }

    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('dossiers')) {
        const store = db.createObjectStore('dossiers', { keyPath: 'id' });
        store.createIndex('status', 'status');
        store.createIndex('createdAt', 'createdAt');
      }
    };
    req.onsuccess = e => res(e.target.result);
    req.onerror = e => rej(e.target.error);
  });
}

async function dbGetAll() {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction('dossiers', 'readonly');
    const req = tx.objectStore('dossiers').getAll();
    req.onsuccess = e => res(e.target.result);
    req.onerror = e => rej(e.target.error);
  });
}

async function dbPut(record) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction('dossiers', 'readwrite');
    tx.objectStore('dossiers').put(record);
    tx.oncomplete = () => res(record);
    tx.onerror = e => rej(e.target.error);
  });
}

async function dbDelete(id) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction('dossiers', 'readwrite');
    tx.objectStore('dossiers').delete(id);
    tx.oncomplete = () => res();
    tx.onerror = e => rej(e.target.error);
  });
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

function getTranche(montant) {
  const m = Number(montant);
  return TRANCHES.find(t => m >= t.min && m < t.max) || TRANCHES[0];
}

function getDocsForDossier(trancheId, typeClient, casSousB) {
  const t = DOCS_CONFIG[trancheId] || DOCS_CONFIG['t1'];
  const tc = t[typeClient] || t['PHYS'];
  const bDocs = casSousB === 'CAS2' ? (tc.B_CAS2 || []) : (tc.B_CAS1 || []);
  return { A: tc.A || [], B: bDocs, C: tc.C || [], D: tc.D || [] };
}

function calcCompletion(dossier) {
  const docs = getDocsForDossier(dossier.trancheId, dossier.typeClient, dossier.casSousB);
  const allRequired = [...docs.A, ...docs.B, ...docs.C].filter(d => d.required);
  if (allRequired.length === 0) return 100;
  const uploaded = allRequired.filter(d => dossier.files && dossier.files[d.id] && dossier.files[d.id].length > 0);
  return Math.round((uploaded.length / allRequired.length) * 100);
}

function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' });
}

function fmtMontant(n) {
  if (!n) return '—';
  return Number(n).toLocaleString('fr-FR') + ' FCFA';
}

function getInitials(nom) {
  return (nom || '??').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
}

function getDossierStatus(completion) {
  if (completion === 100) return 'complet';
  if (completion >= 50) return 'partiel';
  return 'nouveau';
}

// ─── FILE → BASE64 ───────────────────────────────────────────────────────────
function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res({ name: file.name, size: file.size, type: file.type, data: r.result });
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

// ─── COMPLETION RING SVG ──────────────────────────────────────────────────────
function Ring({ pct, size = 64, stroke = 6 }) {
  const r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const filled = (pct / 100) * circ;
  const color = pct === 100 ? '#2D8FD4' : pct >= 50 ? '#87CEEB' : '#1A78C2';
  return (
    <div className="completion-ring" style={{ width: size, height: size }}>
      <svg width={size} height={size}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#EDE9E1" strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
          strokeDasharray={`${filled} ${circ}`} strokeLinecap="round"
          transform={`rotate(-90 ${size/2} ${size/2})`}/>
      </svg>
      <span className="ring-label" style={{ color, fontSize: size < 50 ? '0.65rem' : '0.9rem' }}>{pct}%</span>
    </div>
  );
}

// ─── BADGE STATUS ─────────────────────────────────────────────────────────────
function StatusBadge({ completion }) {
  const s = getDossierStatus(completion);
  if (s === 'complet') return <span className="badge badge-complete"><span className="badge-dot"/>Complet</span>;
  if (s === 'partiel') return <span className="badge badge-partial"><span className="badge-dot"/>En cours</span>;
  return <span className="badge badge-new"><span className="badge-dot"/>Nouveau</span>;
}

function NouveauDossier({ onSave, onCancel }) {

  const set = (k, v) => setForm(f => ({...f, [k]: v}));

  const tranche = form.montant ? getTranche(form.montant) : null;

  const validate = () => {
    const e = {};
    if (!form.nomClient.trim()) e.nomClient = 'Requis';
    if (!form.numeroDossier.trim()) e.numeroDossier = 'Le numéro de compte est requis';

            <div className="form-group full">
              <label className="form-label">Situation crédit (Sous-dossier B) <span>*</span></label>
              <select className="form-select" value={form.casSousB} onChange={e=>set('casSousB',e.target.value)}>
                <option value="CAS1">Cas 1 — Aucun crédit au paravent</option>
                <option value="CAS2">Cas 2 — Crédit en cours / a déjà eu un crédit ailleurs</option>
              </select>
              <span className="form-hint">
                {form.casSousB === 'CAS1'
                  ? 'Le client n\'a jamais eu de crédit auparavant.'
                  : 'Le client a un crédit en cours ou a déjà eu un crédit ailleurs (tableau d\'amortissement requis).'}
              </span>
            </div>
            <div className="form-group">
              <label className="form-label">Téléphone</label>
              <input className="form-input" value={form.telephone} onChange={e=>set('telephone',e.target.value)} placeholder="6XX XXX XXX"/>
            </div>
            <div className="form-group">
              <label className="form-label">Email</label>
              <input className="form-input" type="email" value={form.email} onChange={e=>set('email',e.target.value)} placeholder="client@email.com"/>
            </div>
            <div className="form-group full">
              <label className="form-label">Adresse</label>
              <input className="form-input" value={form.adresse} onChange={e=>set('adresse',e.target.value)} placeholder="Quartier, Ville"/>
            </div>
          </div>
        </div>

        <div className="card" style={{marginBottom:20}}>
          <div className="section-title" style={{marginBottom:16}}>Informations du crédit</div>
          <div className="form-grid">
            <div className="form-group">
              <label className="form-label">Montant demandé (FCFA) <span>*</span></label>
              <input className="form-input" type="number" value={form.montant} onChange={e=>set('montant',e.target.value)} placeholder="Ex: 250000"/>
              {errors.montant && <span style={{color:'var(--danger)',fontSize:'0.75rem'}}>{errors.montant}</span>}
              {tranche && <span className="form-hint">→ {tranche.label}</span>}
            </div>
            <div className="form-group">
              <label className="form-label">Durée de remboursement</label>
              <input className="form-input" value={form.duree} onChange={e=>set('duree',e.target.value)} placeholder="Ex: 12 mois"/>
            </div>
            <div className="form-group full">
              <label className="form-label">Objet du crédit <span>*</span></label>
              <textarea className="form-textarea" value={form.objet} onChange={e=>set('objet',e.target.value)} placeholder="Décrire l'objet du financement..."/>
              {errors.objet && <span style={{color:'var(--danger)',fontSize:'0.75rem'}}>{errors.objet}</span>}
            </div>
            <div className="form-group">
              <label className="form-label">N° Compte <span>*</span></label>
              <input className="form-input" value={form.numeroDossier} onChange={e=>set('numeroDossier',e.target.value)} placeholder="Ex: 001234567"/>
              {errors.numeroDossier && <span style={{color:'var(--danger)',fontSize:'0.75rem'}}>{errors.numeroDossier}</span>}
            </div>
          </div>
        </div>
      </div>
    </>
  );
}

// ─── DETAIL DOSSIER ───────────────────────────────────────────────────────────
function DetailDossier({ dossier, onBack, onUpdate, onDelete }) {
  const [activeTab, setActiveTab] = useState('A');
  const [dragging, setDragging] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(false);
  const fileInputRef = useRef();
  const [pendingDocId, setPendingDocId] = useState(null);

  const docs = getDocsForDossier(dossier.trancheId, dossier.typeClient, dossier.casSousB);
  const completion = calcCompletion(dossier);
  const allDocs = [...docs.A, ...docs.B, ...docs.C, ...docs.D];

  const validatedTabs = dossier.validatedTabs || [];
  const casSousB = dossier.casSousB || 'CAS1';
  const TAB_LABELS = {
    A: 'Sous-dossier A',
    B: casSousB === 'CAS2' ? 'B — Crédit en cours' : 'B — Aucun crédit',
    C: 'C — Garanties',
    D: 'D — Litiges',
  };
  const TAB_ORDER = ['A','B','C','D'];

  // Un onglet est accessible si tous les précédents sont validés
  const isTabUnlocked = (t) => {
    const idx = TAB_ORDER.indexOf(t);
    if (idx === 0) return true;
    return TAB_ORDER.slice(0, idx).every(prev => validatedTabs.includes(prev));
  };

  // Un sous-dossier est "complet" si tous ses docs obligatoires sont uploadés
  const isTabComplete = (t) => {
    const tabDocs = docs[t] || [];
    const required = tabDocs.filter(d => d.required);
    if (required.length === 0) return true;
    return required.every(d => dossier.files?.[d.id]?.length > 0);
  };

  const isCurrentTabValidated = validatedTabs.includes(activeTab);
  const isCurrentTabComplete = isTabComplete(activeTab);
  const currentTabDocs = docs[activeTab] || [];
  const missingCount = (docs[activeTab] || []).filter(d => d.required && !(dossier.files?.[d.id]?.length > 0)).length;
  const nextTab = TAB_ORDER[TAB_ORDER.indexOf(activeTab) + 1];

  const handleValidateTab = () => {
    const newValidated = [...validatedTabs, activeTab];
    const updated = {
      ...dossier,
      validatedTabs: newValidated,
      historique: [...(dossier.historique || []), {
        at: Date.now(),
        action: `Sous-dossier ${activeTab} validé`,
        icon: '✅',
      }],
      updatedAt: Date.now(),
    };
    onUpdate(updated);
    if (nextTab && isTabUnlocked(nextTab)) setTimeout(() => setActiveTab(nextTab), 150);
  };

  const handleUnvalidateTab = () => {
    // Dé-valider aussi tous les onglets suivants
    const idx = TAB_ORDER.indexOf(activeTab);
    const newValidated = validatedTabs.filter(t => TAB_ORDER.indexOf(t) < idx);
    const updated = {
      ...dossier,
      validatedTabs: newValidated,
      historique: [...(dossier.historique || []), {
        at: Date.now(),
        action: `Validation du sous-dossier ${activeTab} annulée`,
        icon: '↩️',
      }],
      updatedAt: Date.now(),
    };
    onUpdate(updated);
  };

  const tabCounts = {
    A: docs.A.filter(d => dossier.files?.[d.id]?.length > 0).length + '/' + docs.A.length,
    B: docs.B.filter(d => dossier.files?.[d.id]?.length > 0).length + '/' + docs.B.length,
    C: docs.C.filter(d => dossier.files?.[d.id]?.length > 0).length + '/' + docs.C.length,
    D: (dossier.files?.['d_litige_free']?.length || 0) + ' fichier(s)',
  };

  const currentDocs = docs[activeTab] || [];

  const uploadFilesForDoc = async (docId, fileList) => {
    const newFiles = await Promise.all([...fileList].map(fileToBase64));
    const updated = {
      ...dossier,
      files: { ...dossier.files, [docId]: [...(dossier.files?.[docId] || []), ...newFiles] },
      historique: [...(dossier.historique || []), {
        at: Date.now(),
        action: `Fichier(s) ajouté(s) : ${newFiles.map(f=>f.name).join(', ')}`,
        icon: '📎',
      }],
      updatedAt: Date.now(),
    };
    onUpdate(updated);
  };

  const removeFile = (docId, idx) => {
    const arr = [...(dossier.files?.[docId] || [])];
    arr.splice(idx, 1);
    const updated = {
      ...dossier,
      files: { ...dossier.files, [docId]: arr },
      historique: [...(dossier.historique || []), { at: Date.now(), action: 'Fichier supprimé', icon: '🗑️' }],
      updatedAt: Date.now(),
    };
    onUpdate(updated);
  };

  const handleDropZone = async (e, docId) => {
    e.preventDefault(); setDragging(null);
    const files = e.dataTransfer?.files || e.target.files;
    if (files?.length) await uploadFilesForDoc(docId, files);
  };

  const triggerUpload = (docId) => { setPendingDocId(docId); fileInputRef.current.click(); };

  return (
    <>
      <div className="topbar">
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <button className="btn btn-outline btn-sm" onClick={onBack}>← Retour</button>
          <div className="topbar-title">{dossier.nomClient}</div>
          <StatusBadge completion={completion}/>
        </div>
        <div className="topbar-actions">
          <button className="btn btn-outline btn-sm" style={{color:'var(--danger)',borderColor:'#FFCDD2'}} onClick={() => setConfirmDelete(true)}>🗑 Supprimer</button>
        </div>
      </div>

      <input ref={fileInputRef} type="file" multiple accept="image/*,.pdf,.doc,.docx"
        style={{display:'none'}} onChange={e => { if (pendingDocId) uploadFilesForDoc(pendingDocId, e.target.files); e.target.value=''; }}/>

      <div className="page-body">
        <div className="detail-grid">
          {/* LEFT: DOSSIER UPLOAD */}
          <div>
            {/* Infos rapides */}
            <div className="card card-sm" style={{marginBottom:20,display:'flex',gap:24,flexWrap:'wrap'}}>
              <div><div style={{fontSize:'0.7rem',color:'var(--mist)',marginBottom:2}}>MONTANT</div><strong>{fmtMontant(dossier.montant)}</strong></div>
              <div><div style={{fontSize:'0.7rem',color:'var(--mist)',marginBottom:2}}>TRANCHE</div><strong style={{fontSize:'0.82rem'}}>{dossier.trancheLabel}</strong></div>
              <div><div style={{fontSize:'0.7rem',color:'var(--mist)',marginBottom:2}}>TYPE CLIENT</div><strong>{dossier.typeClient === 'PHYS' ? 'Pers. Physique' : 'Pers. Morale'}</strong></div>
              <div><div style={{fontSize:'0.7rem',color:'var(--mist)',marginBottom:2}}>DOSSIER B</div><strong style={{fontSize:'0.78rem'}}>{dossier.casSousB === 'CAS2' ? 'Crédit en cours' : 'Aucun crédit'}</strong></div>
              <div><div style={{fontSize:'0.7rem',color:'var(--mist)',marginBottom:2}}>CRÉÉ LE</div><strong>{fmtDate(dossier.createdAt)}</strong></div>
              {dossier.duree && <div><div style={{fontSize:'0.7rem',color:'var(--mist)',marginBottom:2}}>DURÉE</div><strong>{dossier.duree}</strong></div>}
            </div>

            {completion < 100 && (
              <div className="alert alert-warning" style={{marginBottom:16}}>
                <span>⚠️</span>
                <div>Dossier incomplet — <strong>{allDocs.filter(d=>d.required && !(dossier.files?.[d.id]?.length>0)).length} document(s) requis</strong> manquants.</div>
              </div>
            )}
            {completion === 100 && (
              <div className="alert alert-success" style={{marginBottom:16}}>
                <span>✅</span>
                <div><strong>Dossier complet !</strong> Tous les documents requis ont été uploadés.</div>
              </div>
            )}

            {/* Sous-dossier tabs */}
            <div className="sous-dossier-tabs">
              {TAB_ORDER.map(t => {
                const unlocked = isTabUnlocked(t);
                const validated = validatedTabs.includes(t);
                let cls = 'tab-btn';
                if (activeTab === t) cls += ' active';
                else if (!unlocked) cls += ' locked';
                else if (validated) cls += ' validated';
                return (
                  <button key={t} className={cls}
                    onClick={() => { if (unlocked) setActiveTab(t); }}
                    title={!unlocked ? `Validez d'abord le sous-dossier ${TAB_ORDER[TAB_ORDER.indexOf(t)-1]}` : ''}>
                    {validated && activeTab !== t && <span className="tab-icon">✅</span>}
                    {!unlocked && <span className="tab-icon">🔒</span>}
                    Sous-dossier {t}
                    <span className="tab-count">{tabCounts[t]}</span>
                  </button>
                );
              })}
            </div>

            {/* Upload zone globale */}
            <div
              className={`upload-zone ${dragging==='zone' ? 'drag-over' : ''}`}
              style={{marginBottom:16, opacity: isCurrentTabValidated ? 0.5 : 1, pointerEvents: isCurrentTabValidated ? 'none' : 'auto'}}
              onDragOver={e=>{e.preventDefault();setDragging('zone')}}
              onDragLeave={()=>setDragging(null)}
              onDrop={e => { e.preventDefault(); setDragging(null); }}>
              <div className="upload-icon">{isCurrentTabValidated ? '✅' : activeTab === 'D' ? '⚠️' : '📁'}</div>
              <div className="upload-title">{TAB_LABELS[activeTab]}</div>
              <div className="upload-sub">
                {isCurrentTabValidated
                  ? 'Sous-dossier validé — annulez pour modifier'
                  : activeTab === 'B'
                    ? (casSousB === 'CAS2'
                        ? 'Client avec crédit en cours ou ayant déjà eu un crédit ailleurs'
                        : 'Client sans crédit antérieur — aucun crédit au paravent')
                    : activeTab === 'C'
                      ? 'Garanties et cautions exigées selon la tranche'
                      : activeTab === 'D'
                        ? 'Sous-dossier litiges — aucun document obligatoire. Le gestionnaire peut ajouter des justificatifs si nécessaire.'
                        : 'Cliquez sur un document ci-dessous pour uploader'}
              </div>
            </div>

            {/* Checklist documents — masquée pour D */}
            {activeTab !== 'D' && (
              <div className="doc-checklist">
                {currentDocs.map(doc => {
                  const uploaded = dossier.files?.[doc.id] || [];
                  const hasFile = uploaded.length > 0;
                  return (
                    <div key={doc.id} className={`doc-item ${hasFile ? 'uploaded' : doc.required ? 'missing' : ''}`}>
                      <div className={`doc-check ${hasFile ? 'ok' : doc.required ? 'req' : 'no'}`}>
                        {hasFile ? '✓' : doc.required ? '!' : '○'}
                      </div>
                      <div style={{flex:1, minWidth:0}}>
                        <div className="doc-name">{doc.label}{doc.required && <span style={{color:'var(--rust)',marginLeft:4}}>*</span>}</div>
                        {hasFile && (
                          <div className="files-grid">
                            {uploaded.map((f,i) => (
                              <span key={i} className="file-pill">
                                📎 {f.name.length > 22 ? f.name.slice(0,20)+'…' : f.name}
                                {!isCurrentTabValidated && <button className="file-pill-remove" onClick={()=>removeFile(doc.id,i)}>×</button>}
                              </span>
                            ))}
                          </div>
                        )}
                      </div>
                      <div className="doc-actions">
                        {!isCurrentTabValidated && (
                          <button className="btn btn-outline btn-sm" onClick={() => triggerUpload(doc.id)}>
                            {hasFile ? '+ Ajouter' : '↑ Uploader'}
                          </button>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {/* Sous-dossier D — upload libre pour justificatifs de litige */}
            {activeTab === 'D' && (
              <div style={{marginBottom:8}}>
                <div style={{background:'#FFF8E1',border:'1px solid #FFE082',borderRadius:10,padding:'14px 16px',marginBottom:16,fontSize:'0.82rem',color:'#7B5800',display:'flex',gap:10,alignItems:'flex-start'}}>
                  <span style={{fontSize:'1.1rem',flexShrink:0}}>ℹ️</span>
                  <div><strong>Sous-dossier Litiges (D)</strong> — Aucun document n'est obligatoire ici. Le gestionnaire peut ajouter des justificatifs exigés en cas de litige (attestation, courrier, preuve de paiement…). Le dossier peut être validé même si ce sous-dossier est vide.</div>
                </div>
                {(dossier.files?.['d_litige_free'] || []).length > 0 && (
                  <div className="doc-item uploaded" style={{marginBottom:8}}>
                    <div className="doc-check ok">✓</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div className="doc-name">Justificatifs ajoutés</div>
                      <div className="files-grid">
                        {(dossier.files?.['d_litige_free'] || []).map((f,i) => (
                          <span key={i} className="file-pill">
                            📎 {f.name.length > 22 ? f.name.slice(0,20)+'…' : f.name}
                            {!isCurrentTabValidated && <button className="file-pill-remove" onClick={()=>removeFile('d_litige_free',i)}>×</button>}
                          </span>
                        ))}
                      </div>
                    </div>
                  </div>
                )}
                {!isCurrentTabValidated && (
                  <button className="btn btn-outline" style={{width:'100%',justifyContent:'center',padding:'12px'}} onClick={() => triggerUpload('d_litige_free')}>
                    + Ajouter un justificatif de litige
                  </button>
                )}
              </div>
            )}

            {/* Bandeau de validation */}
            {isCurrentTabValidated ? (
              <div className="validation-banner done">
                <div className="validation-banner-left">
                  <div className="validation-banner-icon">✅</div>
                  <div>
                    <div className="validation-banner-title">{TAB_LABELS[activeTab]} validé</div>
                    <div className="validation-banner-sub">Ce sous-dossier a été validé. Les documents ne peuvent plus être modifiés.</div>
                  </div>
                </div>
                <button className="btn-unvalidate" onClick={handleUnvalidateTab}>↩ Annuler la validation</button>
              </div>
            ) : activeTab === 'D' ? (
              <div className="validation-banner ready">
                <div className="validation-banner-left">
                  <div className="validation-banner-icon">🎯</div>
                  <div>
                    <div className="validation-banner-title">Sous-dossier D — Prêt à valider</div>
                    <div className="validation-banner-sub">Aucun document obligatoire. Vous pouvez valider et finaliser le dossier.</div>
                  </div>
                </div>
                <button className="btn-validate" onClick={handleValidateTab}>✓ Valider le sous-dossier D</button>
              </div>
            ) : isCurrentTabComplete ? (
              <div className="validation-banner ready">
                <div className="validation-banner-left">
                  <div className="validation-banner-icon">🎯</div>
                  <div>
                    <div className="validation-banner-title">{TAB_LABELS[activeTab]} complet !</div>
                    <div className="validation-banner-sub">Tous les documents obligatoires sont présents. Vous pouvez valider pour {nextTab ? `passer au ${TAB_LABELS[nextTab]}` : 'finaliser le dossier'}.</div>
                  </div>
                </div>
                <button className="btn-validate" onClick={handleValidateTab}>
                  ✓ Valider le sous-dossier {activeTab}
                  {nextTab && <span style={{opacity:0.8}}>→ {nextTab}</span>}
                </button>
              </div>
            ) : (
              <div className="validation-banner incomplete">
                <div className="validation-banner-left">
                  <div className="validation-banner-icon">⚠️</div>
                  <div>
                    <div className="validation-banner-title">{missingCount} document{missingCount > 1 ? 's' : ''} obligatoire{missingCount > 1 ? 's' : ''} manquant{missingCount > 1 ? 's' : ''}</div>
                    <div className="validation-banner-sub">Uploadez tous les documents requis (marqués *) pour pouvoir valider ce sous-dossier.</div>
                  </div>
                </div>
                <button className="btn-validate" disabled>Valider le sous-dossier {activeTab}</button>
              </div>
            )}
          </div>

          {/* RIGHT: Infos + Historique */}
          <div style={{display:'flex',flexDirection:'column',gap:20}}>
            {/* Progression */}
            <div className="card" style={{textAlign:'center'}}>
              <div style={{display:'flex',justifyContent:'center',marginBottom:12}}>
                <Ring pct={completion} size={90} stroke={8}/>
              </div>
              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:'0.9rem'}}>Complétion du dossier</div>
              <div style={{fontSize:'0.78rem',color:'var(--mist)',marginTop:4}}>
                {allDocs.filter(d=>d.required&&dossier.files?.[d.id]?.length>0).length}/{allDocs.filter(d=>d.required).length} doc. obligatoires
              </div>
            </div>

            {/* Infos client */}
            <div className="card">
              <div className="section-title" style={{marginBottom:12}}>Client</div>
              <div className="info-row"><span className="info-key">Nom</span><span className="info-val">{dossier.nomClient}</span></div>
              {dossier.telephone && <div className="info-row"><span className="info-key">Tél.</span><span className="info-val">{dossier.telephone}</span></div>}
              {dossier.email && <div className="info-row"><span className="info-key">Email</span><span className="info-val" style={{fontSize:'0.8rem'}}>{dossier.email}</span></div>}
              {dossier.adresse && <div className="info-row"><span className="info-key">Adresse</span><span className="info-val">{dossier.adresse}</span></div>}
              {dossier.objet && <div className="info-row" style={{borderBottom:'none',paddingTop:10}}><span className="info-key">Objet</span><span className="info-val" style={{fontSize:'0.8rem',textAlign:'right',maxWidth:'60%'}}>{dossier.objet}</span></div>}
            </div>

            {/* Historique */}
            <div className="card">
              <div className="section-title" style={{marginBottom:14}}>Historique</div>
              <div className="timeline">
                {[...(dossier.historique||[])].reverse().slice(0,8).map((h, i) => (
                  <div key={i} className="timeline-item">
                    <div className={`timeline-dot ${i===0?'gold':''}`}>{h.icon||'•'}</div>
                    <div className="timeline-content">
                      <div className="timeline-action">{h.action}</div>
                      <div className="timeline-time">{fmtDate(h.at)} {new Date(h.at).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* CONFIRM DELETE MODAL */}
      {confirmDelete && (
        <div className="modal-overlay" onClick={() => setConfirmDelete(false)}>
          <div className="modal" style={{maxWidth:420}} onClick={e=>e.stopPropagation()}>
            <div className="modal-header">
              <div className="modal-title">⚠️ Supprimer ce dossier ?</div>
              <button className="modal-close" onClick={() => setConfirmDelete(false)}>×</button>
            </div>
            <div className="modal-body">
              <p style={{fontSize:'0.9rem'}}>Vous êtes sur le point de supprimer définitivement le dossier de <strong>{dossier.nomClient}</strong> ainsi que tous les fichiers associés. Cette action est irréversible.</p>
            </div>
            <div className="modal-footer">
              <button className="btn btn-outline" onClick={() => setConfirmDelete(false)}>Annuler</button>
              <button className="btn btn-danger" onClick={onDelete}>Supprimer définitivement</button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
